<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projectile Motion Lab</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Projectile Motion Lab</h1>
      <span>physics simulation</span>
    </header>

    <div class="layout">
      <aside class="controls">
        <div class="control-row">
          <div class="control-header">
            <span class="control-name">Initial Velocity</span
            ><span class="control-unit">m/s</span>
          </div>
          <div class="control-value-row">
            <input
              type="range"
              id="vel-s"
              min="5"
              max="100"
              step="1"
              value="40"
            />
            <input
              type="number"
              id="vel-n"
              min="5"
              max="100"
              step="1"
              value="40"
            />
          </div>
        </div>
        <div class="control-row">
          <div class="control-header">
            <span class="control-name">Launch Angle</span
            ><span class="control-unit">deg</span>
          </div>
          <div class="control-value-row">
            <input
              type="range"
              id="angle-s"
              min="1"
              max="89"
              step="1"
              value="45"
            />
            <input
              type="number"
              id="angle-n"
              min="1"
              max="89"
              step="1"
              value="45"
            />
          </div>
        </div>
        <div class="control-row">
          <div class="control-header">
            <span class="control-name">Launch Height</span
            ><span class="control-unit">m</span>
          </div>
          <div class="control-value-row">
            <input type="range" id="h0-s" min="0" max="50" step="1" value="0" />
            <input
              type="number"
              id="h0-n"
              min="0"
              max="50"
              step="1"
              value="0"
            />
          </div>
        </div>
        <div class="control-row">
          <div class="control-header">
            <span class="control-name">Gravity</span
            ><span class="control-unit">m/s²</span>
          </div>
          <div class="control-value-row">
            <input
              type="range"
              id="g-s"
              min="1"
              max="25"
              step="0.1"
              value="9.8"
            />
            <input
              type="number"
              id="g-n"
              min="1"
              max="25"
              step="0.1"
              value="9.8"
            />
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Max Range</div>
            <div class="stat-value" id="s-range">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Max Height</div>
            <div class="stat-value" id="s-height">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Flight Time</div>
            <div class="stat-value" id="s-time">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Impact Speed</div>
            <div class="stat-value" id="s-impact">—</div>
          </div>
        </div>
        <button class="launch-btn" id="launch-btn">Launch</button>
        <button class="reset-btn" id="reset-btn">Reset</button>
      </aside>

      <div class="canvas-wrap">
        <canvas id="c"></canvas>
        <div class="tlabel" id="tlabel"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
